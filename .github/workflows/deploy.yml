name: Build & Deploy to Cloudways

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudways via SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          ARGS: "-rlgoDzvc --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.CLOUDWAYS_HOST }}
          REMOTE_USER: ${{ secrets.CLOUDWAYS_USER }}
          TARGET: ${{ secrets.CLOUDWAYS_PATH }}
          EXCLUDE: "/node_modules/"

      - name: Deploy API folder to Cloudways
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          ARGS: "-rlgoDzvc"
          SOURCE: "api/"
          REMOTE_HOST: ${{ secrets.CLOUDWAYS_HOST }}
          REMOTE_USER: ${{ secrets.CLOUDWAYS_USER }}
          TARGET: ${{ secrets.CLOUDWAYS_PATH }}api/
